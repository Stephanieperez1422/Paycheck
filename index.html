<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Salary Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #fce4ec 0%, #f3e5f5 60%, #e8eaf6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #7e4f73;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border: 1.5px solid #f8bbd0;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 32px rgba(244, 143, 177, 0.15);
    }

    .logo {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #f48fb1, #ce93d8);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin: 0 auto 1.25rem;
      color: white; font-family: 'Playfair Display', serif;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 500;
      color: #7e4f73; text-align: center;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      text-align: center; font-size: 13px;
      color: #b07ab5; margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block; font-size: 12px; font-weight: 500;
      color: #b07ab5; margin-bottom: 0.4rem;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .prefix {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; color: #d4a0c4; font-weight: 500;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 11px 14px 11px 32px;
      border: 1.5px solid #f8bbd0;
      border-radius: 20px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #7e4f73;
      background: rgba(255, 255, 255, 0.75);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #f48fb1;
      box-shadow: 0 0 0 3px rgba(244, 143, 177, 0.15);
    }

    input::placeholder { color: #d4a0c4; }

    .no-prefix { padding-left: 14px !important; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none; border-radius: 20px;
      background: linear-gradient(135deg, #f48fb1, #ce93d8);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(244, 143, 177, 0.35),
                  inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 60%);
      border-radius: 20px; pointer-events: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(244, 143, 177, 0.45),
                  inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .divider {
      height: 1px; background: #fce4ec;
      margin: 1.75rem 0 1.25rem;
    }

    .note {
      text-align: center; font-size: 11px;
      color: #d4a0c4; font-style: italic;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">💼</div>
    <h1>Salary Calculator</h1>
    <p class="subtitle">Enter hours worked and rate of pay to calculate salary.</p>

    <form action="http://stephanieperez1422.wuaze.com/paycheck.php" method="POST">

      <div class="field">
        <label for="hours">Hours Worked</label>
        <div class="input-wrap">
          <span class="prefix">⏱</span>
          <input
            type="number"
            id="hours"
            name="hours"
            placeholder="e.g. 40"
            min="0"
            step="0.5"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="rate">Rate of Pay (per hour)</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input
            type="number"
            id="rate"
            name="rate"
            placeholder="e.g. 18.50"
            min="0"
            step="0.01"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn">Calculate Salary →</button>

    </form>

    <div class="divider"></div>
    <p class="note">Salary = Hours Worked × Rate of Pay</p>
  </div>

</body>
</html>
